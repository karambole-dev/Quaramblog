site_name: Quaramblog

theme:
  name: material
  logo: assets/yotsuba.png
  favicon: assets/yotsuba.png

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets